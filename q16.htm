<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span Demo</title>
    <style>
        body {
            text-align: center;
        }

        #container
        {
            border: 5px solid rgb(0, 0, 0);
        }

        div {
            padding: 10px;
            margin: 4px 0;
            font-size: 14px;
        }

        #div1 {
            background-color: #f08080;
        }

        #div2 {
            background-color: #6a5acd;
            color: white;
        }

        #div3 {
            background-color: #90ee90;
        }

        #span1 {
            background-color: yellow;
        }

        #span2 {
            background-color: cyan;
        }

        #span3 {
            background-color: orange;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="div1">Text in &lt;div&gt; tag 1</div>
        <div id="div2">Text in &lt;div&gt; tag 2</div>
        <div id="div3">Text in &lt;div&gt; tag 3</div>
        <div>
            <span id="span1">Text in &lt;span&gt; tag 1</span>
            <span id="span2">Text in &lt;span&gt; tag 2</span>
            <span id="span3">Text in &lt;span&gt; tag 3</span>
        </div>
    </div>
</body>

</html>
