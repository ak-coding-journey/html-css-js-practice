<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body
        {
            background: radial-gradient(circle, rgb(247, 125, 125), rgb(180, 234, 243)),
                        linear-gradient(to right, lightblue, rgb(46, 240, 46));
        }
        
        .vid {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
    </style>
    <head>
        <title>Video Tag Demo</title>
    </head>
<body>
    <div class="vid">
        <h1>Adding a video using &lt;video&gt; tag</h1>

        <video src="videoplayback.mp4" controls height="500" width="300" title="Aura farming"></video>
    </div>
</body>
</html>
